       - name: Run Video Processing Script from Google Drive
        id: process_video
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          TIMESTAMPS: ${{ github.event.inputs.timestamps }}
        run: |
          python << 'PYTHON'
          import os
          import sys
          import re
          import glob

          video_url = os.environ.get("VIDEO_URL", "").strip()
          timestamps_raw = os.environ.get("TIMESTAMPS", "").strip()

          if not video_url:
              print("⚠️ URL Video kosong. Melewati proses download & potong.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("skip_upload=true\n")
              sys.exit(0)

          # Ambil SEMUA ID Google Drive dari teks VIDEO_URL (Multi-URL)
          drive_ids = re.findall(r'([a-zA-Z0-9_-]{25,})', video_url)

          if not drive_ids:
              print("❌ Tidak ada ID Google Drive yang ditemukan dari URL!")
              sys.exit(1)

          downloaded_files = []

          # Download setiap video satu per satu
          for idx, drive_id in enumerate(drive_ids):
              file_name = f"video_{idx}.mp4"
              download_cmd = f'gdown "https://drive.google.com/uc?id={drive_id}" -O {file_name}'
              print(f"Mencoba download video ke-{idx+1} (ID: {drive_id})...")
              
              if os.system(download_cmd) == 0 and os.path.exists(file_name):
                  downloaded_files.append(file_name)

          if not downloaded_files:
              print("❌ Semua download dari Google Drive gagal.")
              sys.exit(1)

          # Jika hanya ada 1 video
          if len(downloaded_files) == 1:
              os.rename(downloaded_files[0], "video_mentah.mp4")
          else:
              # Jika ada banyak video, gabungkan dulu menjadi 1 video_mentah.mp4
              print(f"Menggabungkan {len(downloaded_files)} video mentah...")
              with open("concat_list.txt", "w") as f:
                  for f_name in downloaded_files:
                      f.write(f"file '{f_name}'\n")
              
              concat_cmd = 'ffmpeg -y -f concat -safe 0 -i concat_list.txt -c copy video_mentah.mp4'
              os.system(concat_cmd)

          source = "video_mentah.mp4"

          # PROSES POTONG & SAMBUNG VIDEO (TIMESTAMPS)
          if timestamps_raw:
              print("Memotong video dengan timestamps:", timestamps_raw)
              parts = timestamps_raw.split(",")
              filter_complex = ""
              concat_inputs = ""

              for i, item in enumerate(parts):
                  start, end = item.strip().split("-")
                  filter_complex += (
                      f"[0:v]trim=start={start}:end={end},setpts=PTS-STARTPTS[v{i}];"
                      f"[0:a]atrim=start={start}:end={end},asetpts=PTS-STARTPTS[a{i}];"
                  )
                  concat_inputs += f"[v{i}][a{i}]"

              filter_complex += (
                  f"{concat_inputs}concat=n={len(parts)}:v=1:a=1[outv][outa]"
              )

              ffmpeg_cmd = (
                  f'ffmpeg -y '
                  f'-i "{source}" '
                  f'-filter_complex "{filter_complex}" '
                  f'-map "[outv]" '
                  f'-map "[outa]" '
                  f'-c:v libx264 '
                  f'-c:a aac '
                  f'video.mp4'
              )

              print("Running FFmpeg...")
              if os.system(ffmpeg_cmd) != 0:
                  print("FFmpeg gagal memotong video.")
                  sys.exit(1)

          else:
              os.rename(source, "video.mp4")

          print("Proses download dan pemotongan multi-video selesai!")
          PYTHON
