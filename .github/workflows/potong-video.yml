name: Process and Cut Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        required: false
        default: ''
      timestamps:
        required: false
        default: ''
      judul:
        required: false
        default: ''
      deskripsi:
        required: false
        default: ''
      tag:
        required: false
        default: ''
      channel:
        required: false
        default: ''
      lokasi:
        required: false
        default: ''
      penggunaan_ai:
        required: false
        default: ''
      pembatasan_usia:
        required: false
        default: ''
      pilih_audiens:
        required: false
        default: ''
      tanggal_bulan_tahun:
        required: false
        default: ''
      jam_tayang:
        required: false
        default: ''

jobs:
  build-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug Inputs
        run: |
          echo "VIDEO_URL=${{ github.event.inputs.video_url }}"
          echo "TIMESTAMPS=${{ github.event.inputs.timestamps }}"
          echo "CHANNEL=${{ github.event.inputs.channel }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg & yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -U yt-dlp

      - name: Create cookies.txt
        run: |
          cat > cookies.txt << 'EOF'
          ${{ secrets.YT_COOKIES }}
          EOF

      - name: Run Video Processing Script
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          TIMESTAMPS: ${{ github.event.inputs.timestamps }}
        run: |
          python -c '
          import os, sys

          video_url = os.getenv("VIDEO_URL")
          timestamps_raw = os.getenv("TIMESTAMPS")

          if not video_url:
              print("Error: URL Video kosong.")
              sys.exit(1)

          print("Download:", video_url)

          result = os.system(
              f"yt-dlp "
              f"--cookies cookies.txt "
              f"-f \"bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]\" "
              f"\"{video_url}\" "
              f"-o video_mentah.mp4"
          )

          if result != 0:
              print("yt-dlp gagal.")
              sys.exit(1)

          if not os.path.exists("video_mentah.mp4"):
              print("Video tidak ditemukan.")
              sys.exit(1)

          if timestamps_raw:
              print("Cut:", timestamps_raw)

              filter_complex = ""
              concat_inputs = ""

              parts = timestamps_raw.split(",")

              for i, item in enumerate(parts):
                  start, end = item.strip().split("-")
                  filter_complex += (
                      f"[0:v]trim=start={start}:end={end},setpts=PTS-STARTPTS[v{i}];"
                      f"[0:a]atrim=start={start}:end={end},asetpts=PTS-STARTPTS[a{i}];"
                  )
                  concat_inputs += f"[v{i}][a{i}]"

              filter_complex += (
                  f"{concat_inputs}concat=n={len(parts)}:v=1:a=1[outv][outa]"
              )

              cmd = (
                  f'ffmpeg -y -i video_mentah.mp4 '
                  f'-filter_complex "{filter_complex}" '
                  f'-map "[outv]" '
                  f'-map "[outa]" '
                  f'-c:v libx264 '
                  f'-c:a aac '
                  f'video.mp4'
              )

              if os.system(cmd) != 0:
                  print("FFmpeg gagal.")
                  sys.exit(1)
          else:
              os.rename("video_mentah.mp4", "video.mp4")

          print("Selesai.")
          '

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node Dependencies
        run: |
          npm install googleapis

      - name: Upload to YouTube via Node.js
        env:
          CLIENT_ID: ${{ secrets[format('YOUTUBE_CLIENT_ID_f044_{0}', github.event.inputs.channel)] }}
          CLIENT_SECRET: ${{ secrets[format('YOUTUBE_CLIENT_SECRET_f044_{0}', github.event.inputs.channel)] }}
          REFRESH_TOKEN: ${{ secrets[format('YOUTUBE_REFRESH_TOKEN_f044_{0}', github.event.inputs.channel)] }}

          VIDEO_TITLE: ${{ github.event.inputs.judul }}
          VIDEO_DESCRIPTION: ${{ github.event.inputs.deskripsi }}
          PUBLISH_DATE: ${{ github.event.inputs.tanggal_bulan_tahun }}
          VIDEO_TIME: ${{ github.event.inputs.jam_tayang }}
          LOCATION: ${{ github.event.inputs.lokasi }}
          TAGS: ${{ github.event.inputs.tag }}
          AI_CONTENT: ${{ github.event.inputs.penggunaan_ai }}
          AUDIENCE: ${{ github.event.inputs.pilih_audiens }}
          AGE_RESTRICTION: ${{ github.event.inputs.pembatasan_usia }}
          THUMBNAIL_ID: ""

        run: |
          node upload.js
