name: Process and Cut Video from Google Drive

on:
  workflow_dispatch:
    inputs:
      video_url:
        required: false
        default: ''
      timestamps:
        required: false
        default: ''
      videoTitle:
        description: "Judul Video"
        required: false
        default: ''
      videoDescription:
        description: "Deskripsi Video"
        required: false
        default: ''
      tags:
        required: false
        default: ''
      channelName:
        description: "Nama Target Channel"
        required: false
        default: ''
      location:
        required: false
        default: ''
      aiContent:
        required: false
        default: ''
      ageRestriction:
        required: false
        default: ''
      audience:
        required: false
        default: ''
      publishDate:
        description: "Tanggal Rilis (DD-MM-YYYY)"
        required: false
        default: ''
      videoTime:
        description: "Jam Tayang (HH:MM)"
        required: false
        default: ''
      thumbnailId:
        description: "ID Thumbnail Drive"
        required: false
        default: ''

jobs:
  build-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug Inputs
        run: |
          echo "VIDEO_URL = '${{ github.event.inputs.video_url }}'"
          echo "TIMESTAMPS = '${{ github.event.inputs.timestamps }}'"
          echo "channelName = '${{ github.event.inputs.channelName }}'"
          echo "publishDate = '${{ github.event.inputs.publishDate }}'"
          echo "videoTime = '${{ github.event.inputs.videoTime }}'"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install FFmpeg langsung (Cepat)
      - name: Install FFmpeg & Python Dependencies
        run: |
          sudo apt-get install -y --no-install-recommends ffmpeg
          pip install -U gdown requests

      - name: Run Video Processing Script from Google Drive
        id: process_video
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          TIMESTAMPS: ${{ github.event.inputs.timestamps }}
        run: |
          python << 'PYTHON'
          import os
          import sys
          import re
          import glob

          video_url = os.environ.get("VIDEO_URL", "").strip()
          timestamps_raw = os.environ.get("TIMESTAMPS", "").strip()

          if not video_url:
              print("⚠️ URL Video kosong. Melewati proses download & potong.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("skip_upload=true\n")
              sys.exit(0)

          print("Download target Google Drive:", video_url)

          drive_id_match = re.search(r'([a-zA-Z0-9_-]{25,})', video_url)
          drive_id = drive_id_match.group(1) if drive_id_match else None

          if not drive_id:
              print("❌ ID Google Drive tidak ditemukan dari URL!")
              sys.exit(1)

          print(f"Mencoba download dari Google Drive (ID: {drive_id})...")
          
          if "folders" in video_url:
              download_cmd = f'gdown --folder "https://drive.google.com/drive/folders/{drive_id}" -O /tmp/gdrive_folder --remaining-ok'
          else:
              download_cmd = f'gdown "https://drive.google.com/uc?id={drive_id}" -O video_mentah.mp4'

          print("Executing:", download_cmd)
          exit_code = os.system(download_cmd)

          if "folders" in video_url:
              mp4_files = glob.glob("/tmp/gdrive_folder/*.mp4") + glob.glob("/tmp/gdrive_folder/**/*.mp4", recursive=True)
              if mp4_files:
                  os.rename(mp4_files[0], "video_mentah.mp4")
              else:
                  print("❌ Tidak ada file MP4 ditemukan di dalam folder Drive.")
                  sys.exit(1)

          if not os.path.exists("video_mentah.mp4"):
              print("❌ Download dari Google Drive gagal.")
              sys.exit(1)

          print("✅ Download dari Google Drive Berhasil!")
          source = "video_mentah.mp4"

          # PROSES POTONG & SAMBUNG VIDEO
          if timestamps_raw:
              print("Memotong video dengan timestamps:", timestamps_raw)
              parts = timestamps_raw.split(",")
              filter_complex = ""
              concat_inputs = ""

              for i, item in enumerate(parts):
                  start, end = item.strip().split("-")
                  filter_complex += (
                      f"[0:v]trim=start={start}:end={end},setpts=PTS-STARTPTS[v{i}];"
                      f"[0:a]atrim=start={start}:end={end},asetpts=PTS-STARTPTS[a{i}];"
                  )
                  concat_inputs += f"[v{i}][a{i}]"

              filter_complex += (
                  f"{concat_inputs}concat=n={len(parts)}:v=1:a=1[outv][outa]"
              )

              ffmpeg_cmd = (
                  f'ffmpeg -y '
                  f'-i "{source}" '
                  f'-filter_complex "{filter_complex}" '
                  f'-map "[outv]" '
                  f'-map "[outa]" '
                  f'-c:v libx264 '
                  f'-c:a aac '
                  f'video.mp4'
              )

              print("Running FFmpeg...")
              if os.system(ffmpeg_cmd) != 0:
                  print("FFmpeg gagal memotong video.")
                  sys.exit(1)

          else:
              os.rename(source, "video.mp4")

          print("Proses download Drive dan pemotongan selesai!")
          PYTHON

      - name: Setup Node.js
        if: steps.process_video.outputs.skip_upload != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node Dependencies
        if: steps.process_video.outputs.skip_upload != 'true'
        run: |
          npm install googleapis

      - name: Format Channel Name to Uppercase
        if: steps.process_video.outputs.skip_upload != 'true'
        id: format_channel
        run: |
          RAW_CHANNEL="${{ github.event.inputs.channelName }}"
          UPPER_CHANNEL=$(echo "$RAW_CHANNEL" | tr '[:lower:]' '[:upper:]')
          echo "TARGET_CHANNEL=$UPPER_CHANNEL" >> $GITHUB_OUTPUT
          echo "Channel diformat menjadi: $UPPER_CHANNEL"

   #   - name: Upload to YouTube via Node.js
      #  if: steps.process_video.outputs.skip_upload != 'true'
    #    env:
        #  CLIENT_ID: ${{ secrets[format('YOUTUBE_CLIENT_ID_f044_{0}', steps.format_channel.outputs.TARGET_CHANNEL)] }}
          #CLIENT_SECRET: ${{ secrets[format('YOUTUBE_CLIENT_SECRET_f044_{0}', steps.format_channel.outputs.TARGET_CHANNEL)] }}
         # REFRESH_TOKEN: ${{ secrets[format('YOUTUBE_REFRESH_TOKEN_f044_{0}', steps.format_channel.outputs.TARGET_CHANNEL)] }}

         # VIDEO_TITLE: ${{ github.event.inputs.videoTitle }}
          #VIDEO_DESCRIPTION: ${{ github.event.inputs.videoDescription }}
          #PUBLISH_DATE: ${{ github.event.inputs.publishDate }}
         # VIDEO_TIME: ${{ github.event.inputs.videoTime }}
          #THUMBNAIL_ID: ${{ github.event.inputs.thumbnailId }}
         # LOCATION: ${{ github.event.inputs.location || '' }}
         # TAGS: ${{ github.event.inputs.tags || '' }}
          #AI_CONTENT: ${{ github.event.inputs.aiContent || '' }}
          #AUDIENCE: ${{ github.event.inputs.audience || '' }}
          #AGE_RESTRICTION: ${{ github.event.inputs.ageRestriction || '' }}

       # run: |
         # node upload.js

      # 🌟 PENAMBAHAN STEP KHUSUS: Mengirimkan File video.mp4 ke Telegram
      - name: Send Video to Telegram
        if: steps.process_video.outputs.skip_upload != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VIDEO_TITLE: ${{ github.event.inputs.videoTitle }}
        run: |
          echo "Memulai pengiriman video ke Telegram..."
          
          if [ -f "video.mp4" ]; then
            curl -v -F "video=@video.mp4" \
              -F "chat_id=$TELEGRAM_CHAT_ID" \
              -F "caption=🚀 Video Baru Selesai Diproses & Diunggah!%0A%0A📌 *Judul:* $VIDEO_TITLE" \
              -F "parse_mode=Markdown" \
              "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendVideo"
          else
            echo "⚠️ File video.mp4 tidak ditemukan, pengiriman Telegram dilewati."
          fi
