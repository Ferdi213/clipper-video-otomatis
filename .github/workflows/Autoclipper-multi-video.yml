name: Process and Cut Video from Drive & MEGA

on:
  workflow_dispatch:
    inputs:
      video_url:
        required: false
        default: ''
      timestamps:
        description: "Timestamp Video (Contoh: 1-5, 4-10)"
        required: false
        default: ''
      audio_url:
        description: "Link Google Drive Audio (MP3/WAV/M4A/AAC - Pisahkan dengan koma/enter)"
        required: false
        default: ''
      audio_timestamps:
        description: "Timestamp Audio (Contoh: 3-9, 9-14)"
        required: false
        default: ''
      videoTitle:
        description: "Judul Video"
        required: false
        default: ''
      videoDescription:
        description: "Deskripsi Video"
        required: false
        default: ''
      tags:
        required: false
        default: ''
      channelName:
        description: "Nama Target Channel"
        required: false
        default: ''
      location:
        required: false
        default: ''
      aiContent:
        required: false
        default: ''
      ageRestriction:
        required: false
        default: ''
      audience:
        required: false
        default: ''
      publishDate:
        description: "Tanggal Rilis (DD-MM-YYYY)"
        required: false
        default: ''
      videoTime:
        description: "Jam Tayang (HH:MM)"
        required: false
        default: ''
      thumbnailId:
        description: "ID Thumbnail Drive"
        required: false
        default: ''

jobs:
  build-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg megatools
          pip install -U gdown requests
          mkdir -p downloads

      - name: Run Video Processing Script
        id: process_video
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          TIMESTAMPS: ${{ github.event.inputs.timestamps }}
          AUDIO_URL: ${{ github.event.inputs.audio_url }}
          AUDIO_TIMESTAMPS: ${{ github.event.inputs.audio_timestamps }}
        run: |
          python << 'PYTHON'
          import os
          import sys
          import re
          import glob
          import shutil

          # Setup Variabel
          video_url = os.environ.get("VIDEO_URL", "").strip()
          timestamps_raw = os.environ.get("TIMESTAMPS", "").strip()
          audio_url = os.environ.get("AUDIO_URL", "").strip()
          audio_timestamps_raw = os.environ.get("AUDIO_TIMESTAMPS", "").strip()

          downloaded_files = []
          video_files = []
          audio_files = []
          AUDIO_EXTS = {'.mp3', '.wav', '.m4a', '.aac', '.flac', '.ogg'}

          # 1. LOOP DOWNLOAD VIDEO
          if video_url:
              urls = re.split(r'[\n,]+', video_url)
              for idx, url in enumerate(urls):
                  url = url.strip()
                  if not url: continue
                  print(f"Memproses Video ke-{idx+1}: {url}")

                  if "mega.nz" in url:
                      before = set(glob.glob("downloads/*"))
                      os.system(f'megadl "{url}" --path downloads')
                      after = set(glob.glob("downloads/*"))
                      new_files = list(after - before)
                      if new_files:
                          src = new_files[0]
                          ext = os.path.splitext(src)[1]
                          dst = f"video_{idx}{ext}"
                          shutil.move(src, dst)
                          downloaded_files.append(dst)
                  else:
                      file_name = f"video_{idx}.mp4"
                      m = re.search(r'/d/([a-zA-Z0-9_-]+)', url) or re.search(r'id=([a-zA-Z0-9_-]+)', url)
                      if m:
                          os.system(f'gdown "https://drive.google.com/uc?id={m.group(1)}" -O "{file_name}"')
                          if os.path.exists(file_name) and os.path.getsize(file_name) > 0:
                              downloaded_files.append(file_name)

            # 2. LOOP DOWNLOAD AUDIO
            if audio_url:
            audio_urls = re.split(r'[\n,]+', audio_url)
 
           for idx, url in enumerate(audio_urls):
           url = url.strip()
            if not url:
                 continue

             print(f"Memproses Audio ke-{idx+1}: {url}")

             if "mega.nz" in url:
             before = set(glob.glob("downloads/*"))

            os.system(f'megadl "{url}" --path downloads')

            after = set(glob.glob("downloads/*"))
            new_files = list(after - before)

            if new_files:
                src = new_files[0]
                ext = os.path.splitext(src)[1].lower()

                if ext in AUDIO_EXTS:
                    dst = f"audio_{idx}{ext}"
                    shutil.move(src, dst)
                    downloaded_files.append(dst)

             else:
              before = set(glob.glob("downloads/*"))

            os.system(f'gdown --fuzzy "{url}" -O "downloads/audio_{idx}"')

            after = set(glob.glob("downloads/*"))
            new_files = list(after - before)

            if new_files:
                src = new_files[0]
                ext = os.path.splitext(src)[1].lower()

                if ext in AUDIO_EXTS:
                    dst = f"audio_{idx}{ext}"
                    shutil.move(src, dst)
                    downloaded_files.append(dst)
                else:
                    print(f"⚠️ Format audio tidak didukung: {src}")
                    if os.path.exists(src):
                        os.remove(src)
                     
          if not downloaded_files:
              print("❌ Tidak ada file yang berhasil di-download.")
              sys.exit(1)

          # 3. PENGELOMPOKAN
          video_files = [f for f in downloaded_files if os.path.splitext(f)[1].lower() not in AUDIO_EXTS]
          audio_files = [f for f in downloaded_files if os.path.splitext(f)[1].lower() in AUDIO_EXTS]

          if not video_files:
              print("❌ Tidak ada file video.")
              sys.exit(1)
          
          # Gabung Video
          if len(video_files) == 1:
              shutil.copy(video_files[0], "video_gabungan.mp4")
          else:
              with open("concat_list.txt", "w") as f:
                  for f_name in video_files: f.write(f"file '{f_name}'\n")
              os.system('ffmpeg -y -f concat -safe 0 -i concat_list.txt -c:v libx264 -c:a aac video_gabungan.mp4')

          # Gabung Audio
          if audio_files:
              if len(audio_files) == 1:
                  merged_audio = audio_files[0]
              else:
                  with open("audio_concat_list.txt", "w") as f:
                      for a_name in audio_files: f.write(f"file '{a_name}'\n")
                  os.system('ffmpeg -y -f concat -safe 0 -i audio_concat_list.txt -c:a aac audio_gabungan.m4a')
                  merged_audio = "audio_gabungan.m4a"

              os.system(f'ffmpeg -y -i "video_gabungan.mp4" -i "{merged_audio}" -c:v copy -map 0:v:0 -map 1:a:0 -shortest video_mentah.mp4')
          else:
              os.rename("video_gabungan.mp4", "video_mentah.mp4")

          # 4. POTONG TIMESTAMP
          if timestamps_raw:
              parts = timestamps_raw.split(",")
              filter_complex = "".join([f"[0:v]trim=start={p.split('-')[0]}:end={p.split('-')[1]},setpts=PTS-STARTPTS[v{i}];[0:a]atrim=start={p.split('-')[0]}:end={p.split('-')[1]},asetpts=PTS-STARTPTS[a{i}];" for i, p in enumerate(parts)])
              concat_inputs = "".join([f"[v{i}][a{i}]" for i in range(len(parts))])
              filter_complex += f"{concat_inputs}concat=n={len(parts)}:v=1:a=1[outv][outa]"
              os.system(f'ffmpeg -y -i "video_mentah.mp4" -filter_complex "{filter_complex}" -map "[outv]" -map "[outa]" -c:v libx264 -c:a aac video.mp4')
          else:
              os.rename("video_mentah.mp4", "video.mp4")
          PYTHON

      - name: Send Video to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VIDEO_TITLE: ${{ github.event.inputs.videoTitle }}
        run: |
          if [ -f "video.mp4" ]; then
            curl -v -F "video=@video.mp4" -F "chat_id=$TELEGRAM_CHAT_ID" \
              -F "caption=🚀 Video Selesai:%0A📌 *Judul:* $VIDEO_TITLE" \
              -F "parse_mode=Markdown" \
              "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendVideo"
          else
            echo "⚠️ File video.mp4 tidak ditemukan."
          fi
