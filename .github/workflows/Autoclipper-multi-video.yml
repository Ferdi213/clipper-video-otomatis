name: Process and Cut Video from Drive & MEGA

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'URL Video (Pisahkan koma)'
        required: false
        type: textarea
        default: ''
      timestamps:
        description: "Timestamp Video (Format: 00:00-00:05, 00:10-00:15)"
        required: false
        default: ''
      audio_url:
        description: 'Link Audio (Pisahkan koma)'
        required: false
        type: textarea
        default: ''
      audio_timestamps:
        description: "Timestamp Audio (Format: 00:00-00:05)"
        required: false
        default: ''
      videoTitle:
        description: "Judul Video (Wajib)"
        required: true
        default: 'Video Baru'
      videoDescription:
        description: "Deskripsi Video"
        required: false
        type: textarea
        default: ''
      tags:
        description: "Tag (Pisahkan koma)"
        required: false
        type: textarea
        default: ''
      channelName:
        description: "Nama Channel"
        required: false
        default: ''
      location:
        description: "Lokasi Video"
        required: false
        default: ''
      aiContent:
        description: "AI Content Declaration (true/false)"
        required: false
        default: 'false'
      ageRestriction:
        description: "Age Restriction (true/false)"
        required: false
        default: 'false'
      audience:
        description: "Target Penonton (kids/not-kids)"
        required: false
        default: 'not-kids'
      publishDate:
        description: "Tanggal Rilis (DD-MM-YYYY)"
        required: false
        default: ''
      videoTime:
        description: "Jam Tayang (HH:MM)"
        required: false
        default: ''
      thumbnailId:
        description: "ID Thumbnail Drive"
        required: false
        default: ''

jobs:
  build-and-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg megatools
          pip install -q gdown
          mkdir -p downloads ready

      - name: Download & Normalize
        run: |
          # Fungsi untuk download dan konversi ke standar (mp4) agar mudah digabung
          proc_file() {
            local url=$1; local type=$2; local idx=$3
            local temp="downloads/${type}_${idx}.tmp"
            local out="downloads/${type}_${idx}.mp4"
            
            echo "Processing: $url"
            if [[ "$url" == *"mega.nz"* ]]; then
              megadl "$url" --path "downloads"
              mv downloads/* "$temp" 2>/dev/null || true
            else
              gdown "$url" -O "$temp" --quiet
            fi
            
            # Normalisasi instan ke format mp4/aac
            ffmpeg -y -i "$temp" \
              -c:v libx264 -preset ultrafast -crf 26 \
              -r 30 -g 60 -keyint_min 60 -sc_threshold 0 \
              -pix_fmt yuv420p -c:a aac -ar 44100 \
              "$out" -loglevel error
          }

          IFS=',' read -ra VIDS <<< "${{ github.event.inputs.video_url }}"
          for i in "${!VIDS[@]}"; do proc_file "${VIDS[$i]}" "vid" "$i"; done

          IFS=',' read -ra AUDS <<< "${{ github.event.inputs.audio_url }}"
          for i in "${!AUDS[@]}"; do proc_file "${AUDS[$i]}" "aud" "$i"; done

      - name: Merge Media
        run: |
          # 1. Gabung Video dengan MP4Box
          if ls downloads/vid_*.mp4 >/dev/null 2>&1; then
            files=($(ls downloads/vid_*.mp4 | sort -V))
            cmd="MP4Box -new video_mentah.mp4"
            for f in "${files[@]}"; do
              cmd="$cmd -cat \"$f\""
            done
            eval $cmd
          else
            echo "❌ Tidak ada file video untuk digabung!"
            exit 1
          fi

          # 2. Gabung Audio & Tempel ke Video
          if ls downloads/aud_*.mp4 >/dev/null 2>&1; then
             for f in $(ls downloads/aud_*.mp4 | sort -V); do echo "file '$f'" >> aud_list.txt; done
             ffmpeg -y -f concat -safe 0 -i aud_list.txt -c copy audio_gabungan.mp4
             ffmpeg -y -i video_mentah.mp4 -i audio_gabungan.mp4 -c copy -map 0:v:0 -map 1:a:0 -shortest video_final.mp4
          else
             mv video_mentah.mp4 video_final.mp4
          fi

          
      - name: Cut Timestamps
        run: |
          if [ -n "${{ github.event.inputs.timestamps }}" ]; then
            IFS=',' read -ra TS <<< "${{ github.event.inputs.timestamps }}"
            for i in "${!TS[@]}"; do
              start=${TS[$i]%-*}
              end=${TS[$i]#*-}
              ffmpeg -y -ss "$start" -to "$end" -i video_final.mp4 -c copy "seg_$i.mp4" -loglevel error
              echo "file 'seg_$i.mp4'" >> cut_list.txt
            done
            ffmpeg -y -f concat -safe 0 -i cut_list.txt -c copy video.mp4
          else
            mv video_final.mp4 video.mp4
          fi

      - name: Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VIDEO_TITLE: ${{ github.event.inputs.videoTitle }}
        run: |
          if [ -f "video.mp4" ]; then
            curl -s -F "video=@video.mp4" -F "chat_id=$TELEGRAM_CHAT_ID" \
              -F "caption=🚀 Video Selesai: $VIDEO_TITLE" \
              "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendVideo"
          else
            echo "File video tidak ditemukan!"
            exit 1
          fi
