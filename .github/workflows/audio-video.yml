name: Process and Cut Video with Custom Audio from Google Drive

on:
  workflow_dispatch:
    inputs:
      video_url:
        required: false
        default: ''
      timestamps:
        description: "Timestamp Video (Contoh: 1-5, 4-10)"
        required: false
        default: ''
      audio_url:
        description: "Link Google Drive Audio (MP3/WAV/M4A/AAC - Pisahkan dengan koma/enter)"
        required: false
        default: ''
      audio_timestamps:
        description: "Timestamp Audio (Contoh: 3-9, 9-14)"
        required: false
        default: ''
      videoTitle:
        description: "Judul Video"
        required: false
        default: ''
      videoDescription:
        description: "Deskripsi Video"
        required: false
        default: ''
      tags:
        required: false
        default: ''
      channelName:
        description: "Nama Target Channel"
        required: false
        default: ''
      location:
        required: false
        default: ''
      aiContent:
        required: false
        default: ''
      ageRestriction:
        required: false
        default: ''
      audience:
        required: false
        default: ''
      publishDate:
        description: "Tanggal Rilis (DD-MM-YYYY)"
        required: false
        default: ''
      videoTime:
        description: "Jam Tayang (HH:MM)"
        required: false
        default: ''
      thumbnailId:
        description: "ID Thumbnail Drive"
        required: false
        default: ''

jobs:
  build-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug Inputs
        run: |
          echo "VIDEO_URL = '${{ github.event.inputs.video_url }}'"
          echo "TIMESTAMPS = '${{ github.event.inputs.timestamps }}'"
          echo "AUDIO_URL = '${{ github.event.inputs.audio_url }}'"
          echo "AUDIO_TIMESTAMPS = '${{ github.event.inputs.audio_timestamps }}'"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg & Python Dependencies
        run: |
          sudo apt-get install -y --no-install-recommends ffmpeg
          pip install -U gdown requests

      - name: Run Video and Audio Processing Script
        id: process_video
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          TIMESTAMPS: ${{ github.event.inputs.timestamps }}
          AUDIO_URL: ${{ github.event.inputs.audio_url }}
          AUDIO_TIMESTAMPS: ${{ github.event.inputs.audio_timestamps }}
        run: |
          python << 'PYTHON'
          import os
          import sys
          import re
          import subprocess

          def extract_drive_ids(url_string):
              if not url_string:
                  return []
              urls = re.split(r'[\n,]+', url_string)
              drive_ids = []
              for url in urls:
                  url = url.strip()
                  if not url: continue
                  m = re.search(r'/d/([a-zA-Z0-9_-]+)', url)
                  if not m: m = re.search(r'id=([a-zA-Z0-9_-]+)', url)
                  if m: drive_ids.append(m.group(1))
              return drive_ids

          def has_audio_stream(file_path):
              if not os.path.exists(file_path):
                  return False
              cmd = f'ffprobe -v error -select_streams a -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "{file_path}"'
              result = subprocess.run(cmd, shell=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)
              return bool(result.stdout.strip())

          video_url = os.environ.get("VIDEO_URL", "").strip()
          timestamps_raw = os.environ.get("TIMESTAMPS", "").strip()
          audio_url = os.environ.get("AUDIO_URL", "").strip()
          audio_timestamps_raw = os.environ.get("AUDIO_TIMESTAMPS", "").strip()

          if not video_url:
              print("⚠️ URL Video kosong. Melewati proses.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("skip_upload=true\n")
              sys.exit(0)

          # --- 1. DOWNLOAD VIDEO ---
          video_ids = extract_drive_ids(video_url)
          downloaded_videos = []
          for idx, d_id in enumerate(video_ids):
              f_name = f"v_input_{idx}.mp4"
              if os.system(f'gdown "https://drive.google.com/uc?id={d_id}" -O {f_name}') == 0:
                  downloaded_videos.append(f_name)

          if not downloaded_videos:
              print("❌ Gagal men-download video.")
              sys.exit(1)

          if len(downloaded_videos) == 1:
              os.rename(downloaded_videos[0], "source_video.mp4")
          else:
              with open("v_concat.txt", "w") as f:
                  for f_name in downloaded_videos: f.write(f"file '{f_name}'\n")
              os.system('ffmpeg -y -f concat -safe 0 -i v_concat.txt -c:v libx264 -c:a aac source_video.mp4')

          # --- 2. DOWNLOAD AUDIO (Mendukung MP3, WAV, M4A, AAC tanpa ekstensi mentah) ---
          audio_ids = extract_drive_ids(audio_url)
          downloaded_audios = []
          
          for idx, d_id in enumerate(audio_ids):
              # Menggunakan nama tanpa ekstensi agar FFmpeg mendeteksi format otomatis saat dibaca
              f_name = f"a_input_{idx}"
              cmd = f'gdown "https://drive.google.com/uc?id={d_id}" -O "{f_name}"'
              print(f"Mencoba download audio ke-{idx+1} (ID: {d_id})...")
              
              if os.system(cmd) == 0 and os.path.exists(f_name):
                  # Konversi langsung ke AAC standar
                  conv_cmd = f'ffmpeg -y -i "{f_name}" -vn -c:a aac -b:a 192k "a_converted_{idx}.aac"'
                  if os.system(conv_cmd) == 0:
                      downloaded_audios.append(f"a_converted_{idx}.aac")

          if downloaded_audios:
              if len(downloaded_audios) == 1:
                  os.rename(downloaded_audios[0], "source_audio.aac")
              else:
                  with open("a_concat.txt", "w") as f:
                      for f_name in downloaded_audios:
                          f.write(f"file '{f_name}'\n")
                  os.system('ffmpeg -y -f concat -safe 0 -i a_concat.txt -c:a copy source_audio.aac')

          # --- INSPEKSI STREAM FFMPEG BERSAMA FFPROBE ---
          print("\n🔍 --- HASIL INSPEKSI FFPROBE ---")
          print(">> [PROBE VIDEO]:")
          os.system("ffprobe -hide_banner source_video.mp4")
          
          if os.path.exists("source_audio.aac"):
              print("\n>> [PROBE AUDIO EKSTERNAL]:")
              os.system("ffprobe -hide_banner source_audio.aac")
          else:
              print("\n⚠️ File source_audio.aac TIDAK DITEMUKAN.")
          print("------------------------------------\n")

          # Cek keberadaan stream audio
          has_ext_audio = os.path.exists("source_audio.aac") and has_audio_stream("source_audio.aac")
          video_has_audio = has_audio_stream("source_video.mp4")

          print(f"Status Audio Eksternal: {'Tersedia' if has_ext_audio else 'Tidak Ada / Gagal'}")
          print(f"Status Audio Bawaan Video: {'Tersedia' if video_has_audio else 'Tidak Ada (Video Bisu)'}")

          # --- 3. PROSES POTONG & COCOKKAN VIA FFMPEG ---
          v_parts = [p.strip() for p in re.split(r'[,|]+', timestamps_raw) if p.strip()] if timestamps_raw else []
          a_parts = [p.strip() for p in re.split(r'[,|]+', audio_timestamps_raw) if p.strip()] if audio_timestamps_raw else []

          if v_parts:
              filter_complex = ""
              concat_inputs = ""
              include_audio_in_concat = True
              
              for i, v_part in enumerate(v_parts):
                  v_start, v_end = v_part.split("-")
                  filter_complex += f"[0:v]trim=start={v_start}:end={v_end},setpts=PTS-STARTPTS[v{i}];"
                  
                  if has_ext_audio and i < len(a_parts):
                      # Menggunakan audio eksternal [1:a]
                      a_start, a_end = a_parts[i].split("-")
                      filter_complex += f"[1:a]atrim=start={a_start}:end={a_end},asetpts=PTS-STARTPTS[a{i}];"
                      concat_inputs += f"[v{i}][a{i}]"
                  elif video_has_audio:
                      # Menggunakan audio bawaan video [0:a]
                      filter_complex += f"[0:a]atrim=start={v_start}:end={v_end},asetpts=PTS-STARTPTS[a{i}];"
                      concat_inputs += f"[v{i}][a{i}]"
                  else:
                      # Tidak ada audio sama sekali, hanya proses videonya saja
                      include_audio_in_concat = False
                      concat_inputs += f"[v{i}]"

              if include_audio_in_concat:
                  filter_complex += f"{concat_inputs}concat=n={len(v_parts)}:v=1:a=1[outv][outa]"
                  
                  if has_ext_audio:
                      ffmpeg_cmd = (
                          f'ffmpeg -y -i "source_video.mp4" -i "source_audio.aac" '
                          f'-filter_complex "{filter_complex}" '
                          f'-map "[outv]" -map "[outa]" -c:v libx264 -c:a aac video.mp4'
                      )
                  else:
                      ffmpeg_cmd = (
                          f'ffmpeg -y -i "source_video.mp4" '
                          f'-filter_complex "{filter_complex}" '
                          f'-map "[outv]" -map "[outa]" -c:v libx264 -c:a aac video.mp4'
                      )
              else:
                  # Kasus khusus: jika tidak ada audio eksternal DAN video aslinya bisu
                  filter_complex += f"{concat_inputs}concat=n={len(v_parts)}:v=1[outv]"
                  ffmpeg_cmd = (
                      f'ffmpeg -y -i "source_video.mp4" '
                      f'-filter_complex "{filter_complex}" '
                      f'-map "[outv]" -c:v libx264 video.mp4'
                  )

              print("Menjalankan penyusunan Video + Audio...")
              if os.system(ffmpeg_cmd) != 0:
                  print("❌ FFmpeg gagal memproses kecocokan audio video.")
                  sys.exit(1)
          else:
              if has_ext_audio:
                  os.system('ffmpeg -y -i source_video.mp4 -i source_audio.aac -map 0:v:0 -map 1:a:0 -c:v copy -c:a aac video.mp4')
              else:
                  os.rename("source_video.mp4", "video.mp4")

          print("Semua proses pemotongan dan sinkronisasi selesai!")
          PYTHON

      - name: Setup Node.js
        if: steps.process_video.outputs.skip_upload != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node Dependencies
        if: steps.process_video.outputs.skip_upload != 'true'
        run: |
          npm install googleapis

      - name: Format Channel Name to Uppercase
        if: steps.process_video.outputs.skip_upload != 'true'
        id: format_channel
        run: |
          RAW_CHANNEL="${{ github.event.inputs.channelName }}"
          UPPER_CHANNEL=$(echo "$RAW_CHANNEL" | tr '[:lower:]' '[:upper:]')
          echo "TARGET_CHANNEL=$UPPER_CHANNEL" >> $GITHUB_OUTPUT

      - name: Send Video to Telegram
        if: steps.process_video.outputs.skip_upload != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VIDEO_TITLE: ${{ github.event.inputs.videoTitle }}
        run: |
          if [ -f "video.mp4" ]; then
            curl -F "video=@video.mp4" \
              -F "chat_id=$TELEGRAM_CHAT_ID" \
              -F "caption=🚀 Video Baru Selesai Diproses!%0A%0A📌 *Judul:* $VIDEO_TITLE" \
              -F "parse_mode=Markdown" \
              "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendVideo"
          else
            echo "⚠️ File video.mp4 tidak ditemukan."
          fi
